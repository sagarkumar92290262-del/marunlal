<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruanlal Nxt — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700&family=Inter:wght@300;400;500;600&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --black:#0B0B0D; --charcoal:#16151A; --charcoal-2:#1E1C22;
  --ivory:#F5F0E6; --ivory-dim:#C9C3B4;
  --gold:#C9A24B; --gold-light:#F0D58C; --gold-deep:#9C7A2E;
  --bronze:#7A6A4A; --line:rgba(201,162,75,0.22);
  --danger:#d36b6b;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--black);color:var(--ivory);font-family:'Inter',sans-serif;font-weight:300;}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;margin:0;color:var(--ivory);}
button{font-family:inherit;cursor:pointer;}
.eyebrow{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin:0 0 0.5rem;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.85rem 1.7rem;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;border:none;border-radius:3px;transition:all 0.3s var(--ease);}
.btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold) 55%,var(--gold-deep));color:var(--black);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 10px 24px -8px rgba(201,162,75,0.5);}
.btn-ghost{border:1px solid var(--line);background:rgba(255,255,255,0.02);color:var(--ivory);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold-light);}
.btn-block{width:100%;}

.field{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.1rem;}
.field label{font-size:0.76rem;color:var(--ivory-dim);letter-spacing:0.03em;}
.field input, .field select{
  background:var(--charcoal-2);border:1px solid var(--line);color:var(--ivory);
  padding:0.75rem 0.9rem;border-radius:4px;font-family:'Inter',sans-serif;font-size:0.92rem;
}
.field input:focus, .field select:focus{outline:none;border-color:var(--gold);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.optional{font-size:0.68rem;color:var(--bronze);text-transform:uppercase;}
.checkbox-row{display:flex;align-items:center;gap:0.6rem;font-size:0.86rem;color:var(--ivory-dim);cursor:pointer;}
.checkbox-row input{width:16px;height:16px;}

/* ===== Config + Login screens ===== */
.config-screen, .login-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 20%, var(--charcoal), var(--black));
  padding:1.5rem; z-index:100;
}
.config-screen{display:none;}
.login-screen{display:none;}
.config-box, .login-box{
  width:100%;max-width:400px;background:var(--charcoal);border:1px solid var(--line);
  border-radius:8px;padding:2.4rem 2rem;text-align:center;
}
.config-logo, .login-logo{height:64px;margin:0 auto 1.4rem;border-radius:4px;}
.config-box h2, .login-box h2{font-size:1.5rem;margin-bottom:0.6rem;}
.config-help{font-size:0.84rem;color:var(--ivory-dim);line-height:1.6;margin-bottom:1.6rem;text-align:left;}
.config-box .field, .login-box .field{text-align:left;}
.config-error, .login-error{color:var(--danger);font-size:0.8rem;margin-top:0.8rem;min-height:1.2em;}
.login-hint{font-size:0.74rem;color:var(--bronze);margin-top:1.4rem;line-height:1.5;}

/* ===== Admin App ===== */
.admin-app{display:none;}
.admin-header{border-bottom:1px solid var(--line);background:var(--charcoal);}
.admin-header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.6rem;}
.admin-logo{height:42px;border-radius:4px;}
.admin-header-right{display:flex;align-items:center;gap:1.2rem;}
.admin-email{font-size:0.8rem;color:var(--ivory-dim);}

.admin-main{max-width:1200px;margin:0 auto;padding:2.6rem 1.6rem 4rem;}
.admin-top-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.8rem;flex-wrap:wrap;gap:1rem;}
.admin-top-row h1{font-size:2.1rem;}

.admin-filter-row{display:flex;gap:0.6rem;flex-wrap:wrap;margin-bottom:1.8rem;}
.filter-chip{padding:0.5rem 1.1rem;border:1px solid var(--line);border-radius:30px;font-size:0.74rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--ivory-dim);background:none;transition:all 0.3s;}
.filter-chip:hover{border-color:var(--gold);color:var(--gold-light);}
.filter-chip.active{background:var(--gold);border-color:var(--gold);color:var(--black);}

.admin-table-wrap{background:var(--charcoal);border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.admin-table{width:100%;border-collapse:collapse;}
.admin-table th{
  text-align:left;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--gold);padding:1rem 1.2rem;border-bottom:1px solid var(--line);background:var(--charcoal-2);
}
.admin-table td{padding:0.9rem 1.2rem;border-bottom:1px solid var(--line);font-size:0.88rem;vertical-align:middle;}
.admin-table tr:last-child td{border-bottom:none;}
.row-thumb{width:48px;height:60px;border-radius:4px;object-fit:cover;background:var(--charcoal-2);}
.row-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--ivory);}
.row-cat{color:var(--ivory-dim);font-size:0.8rem;}
.row-price{color:var(--gold-light);}
.stock-badge{font-size:0.68rem;padding:0.25rem 0.6rem;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;}
.stock-badge.in{background:rgba(120,180,120,0.15);color:#8fd08f;}
.stock-badge.out{background:rgba(211,107,107,0.15);color:var(--danger);}
.row-actions{display:flex;gap:0.5rem;justify-content:flex-end;}
.row-actions button{
  font-size:0.72rem;padding:0.4rem 0.8rem;border:1px solid var(--line);border-radius:3px;
  background:none;color:var(--ivory-dim);text-transform:uppercase;letter-spacing:0.04em;transition:all 0.25s;
}
.row-actions button:hover{border-color:var(--gold);color:var(--gold-light);}
.row-actions .delete-btn:hover{border-color:var(--danger);color:var(--danger);}

.admin-empty, .admin-loading{padding:3rem 1.5rem;text-align:center;color:var(--ivory-dim);font-size:0.9rem;}

@media (max-width:760px){
  .admin-table thead{display:none;}
  .admin-table, .admin-table tbody, .admin-table tr, .admin-table td{display:block;width:100%;}
  .admin-table tr{padding:1rem 1.2rem;border-bottom:1px solid var(--line);}
  .admin-table td{padding:0.3rem 0;border-bottom:none;}
  .row-actions{justify-content:flex-start;margin-top:0.6rem;}
}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:500;padding:1.2rem;
}
.modal-overlay.show{display:flex;}
.modal-box{
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  background:var(--charcoal);border:1px solid var(--line);border-radius:8px;
}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 1.6rem;border-bottom:1px solid var(--line);}
.modal-head h3{font-size:1.4rem;}
.modal-close{font-size:1.7rem;color:var(--ivory-dim);background:none;border:none;line-height:1;}
.modal-close:hover{color:var(--gold);}
.modal-body{padding:1.6rem;}
.modal-foot{display:flex;justify-content:flex-end;gap:0.8rem;padding:1.2rem 1.6rem;border-top:1px solid var(--line);}

.upload-box{display:block;cursor:pointer;}
.upload-box-inner{
  border:1.5px dashed var(--line);border-radius:6px;padding:1.6rem 1rem;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0.6rem;color:var(--ivory-dim);
  transition:border-color 0.3s;min-height:120px;justify-content:center;
}
.upload-box-inner svg{width:28px;height:28px;color:var(--gold);}
.upload-box-inner span{font-size:0.7rem;color:var(--bronze);}
.upload-box:hover .upload-box-inner{border-color:var(--gold);}
.upload-box-inner img{max-height:120px;border-radius:4px;}

.form-error{color:var(--danger);font-size:0.8rem;min-height:1.2em;margin-top:0.4rem;}

.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--gold);color:var(--black);padding:0.8rem 1.5rem;border-radius:30px;
  font-size:0.84rem;font-weight:500;opacity:0;pointer-events:none;transition:all 0.4s var(--ease);z-index:2000;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);color:var(--ivory);}

</style>
</head>
